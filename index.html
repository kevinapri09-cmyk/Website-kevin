<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Kevin Aprillio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050510;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            padding: 60px 20px;
            background: linear-gradient(to bottom, #001f3f, #050510);
            width: 100%;
        }

        h1 { 
            font-size: 2.2rem; 
            margin-bottom: 10px; 
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
        }
        
        .profile-card {
            margin: 20px auto; 
            padding: 35px; 
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 30px; 
            border: 1px solid rgba(0, 210, 255, 0.3); 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            text-align: left;
        }

        .label { color: #00d2ff; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .info { color: white; font-size: 1.15rem; margin-bottom: 20px; }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
            margin-bottom: 50px;
            width: 80%;
            max-width: 300px;
        }

        .btn {
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            text-align: center;
        }

        .btn-galeri { 
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); 
            color: white; 
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
        }
        
        .btn-contact { 
            background: transparent; 
            color: #00d2ff; 
            border: 2px solid #00d2ff;
        }

        .btn:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0, 210, 255, 0.5); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Selamat Datang di Website Saya<br>Kevin Aprillio</h1>
        <p style="color: #aaa; letter-spacing: 2px;">TUGAS REVISI IT</p>
    </div>

    <div class="profile-card">
        <h2 style="color: #00d2ff; text-align: center; margin-top: 0; border-bottom: 2px solid rgba(0,210,255,0.2); padding-bottom: 10px; letter-spacing: 2px;">ABOUT ME</h2>
        
        <div style="margin-top: 20px;">
            <div class="label">Nama Lengkap</div>
            <div class="info">Kevin Aprillio</div>
            
            <div class="label">Asal & Kelahiran</div>
            <div class="info">Tangerang Selatan, April 2009</div>

            <div class="label">Hobi</div>
            <div class="info" style="font-size: 1rem;">
                🎮 Main Game <br>
                🤝 Bermain Bersama Teman <br>
                📸 Fotografi
            </div>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="galeri.html" class="btn btn-galeri">LIHAT KOLEKSI FOTO</a>
        <a href="contact.html" class="btn btn-contact">HUBUNGI SAYA</a>
    </div>

</body>
</html>
