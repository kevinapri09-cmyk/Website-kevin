<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Kevin Aprillio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050510; /* Angkasa gelap */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        /* Efek Bintang Melayang */
        .stars-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: moveUp linear infinite;
        }

        @keyframes moveUp {
            from { transform: translateY(100vh); }
            to { transform: translateY(-100px); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            padding: 35px 25px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 85%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        h1 { font-size: 1.7rem; margin-bottom: 15px; color: #00d2ff; }
        
        .about-section {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: left;
            border-left: 4px solid #ff00cc;
        }

        .about-section h2 { font-size: 1rem; margin-top: 0; color: #ff00cc; }
        .about-section p { font-size: 0.85rem; margin-bottom: 0; opacity: 0.9; line-height: 1.6; }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 14px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .btn-gallery {
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            color: white;
            box-shadow: 0 5px 15px rgba(51, 51, 255, 0.3);
        }

        .btn-contact {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="star" style="width:2px; height:2px; left:10%; animation-duration:8s;"></div>
        <div class="star" style="width:3px; height:3px; left:30%; animation-duration:12s;"></div>
        <div class="star" style="width:1px; height:1px; left:50%; animation-duration:10s;"></div>
        <div class="star" style="width:2px; height:2px; left:70%; animation-duration:15s;"></div>
        <div class="star" style="width:3px; height:3px; left:90%; animation-duration:9s;"></div>
        <div class="star" style="width:2px; height:2px; left:25%; animation-duration:11s;"></div>
        <div class="star" style="width:1px; height:1px; left:85%; animation-duration:14s;"></div>
    </div>

    <div class="container">
        <h1>Halo, Kevin Aprillio! 👋</h1>
        
        <div class="about-section">
            <h2>Tentang Saya</h2>
            <p>Saya adalah seorang pelajar yang terkadang memfoto pemandangan alam. Saya membuat website ini untuk menampilkan hasil karya saya sekaligus belajar membuat website.</p>
        </div>
        
        <div class="button-group">
            <a href="galeri.html" class="btn btn-gallery">🖼️ Lihat Galeri Pemandangan</a>
            <a href="contact.html" class="btn btn-contact">📧 Hubungi Saya</a>
        </div>
    </div>

</body>
</html>
