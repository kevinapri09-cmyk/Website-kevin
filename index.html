<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Kevin Aprillio</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 85%;
            max-width: 500px;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        p { line-height: 1.6; opacity: 0.9; }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }
        .btn {
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-gallery {
            background: #00d2ff;
            color: #000;
        }
        .btn-contact {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        .btn:hover {
            transform: scale(1.05);
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Halo, nama ku Kevin Aprillio x7! 👋</h1>
        <p>Selamat datang di tempat persembunyian visual saya. Di sini, saya akan membagikan foto-foto pemandangan indah hasil tangkapan saya sendiri.</p>
        
        <div class="button-group">
            <a href="galeri.html" class="btn btn-gallery">🖼️ Lihat Galeri Foto</a>
            <a href="contact.html" class="btn btn-contact">📧 Contact Us</a>
        </div>
    </div>

</body>
</html>
