<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Kevin</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050510;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 20px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 80%;
            max-width: 400px;
        }

        h1 { color: #00d2ff; margin-bottom: 30px; }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            margin: 15px 0;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .social-link:hover {
            background: rgba(0, 210, 255, 0.2);
            transform: translateY(-5px);
        }

        .social-link img {
            width: 30px;
            margin-right: 15px;
        }

        .btn-back {
            display: inline-block;
            margin-top: 30px;
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <h1>Contact Me</h1>
        
        <a href="https://instagram.com/miot58" target="_blank" class="social-link">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
            @miot58
        </a>

        <a href="https://www.tiktok.com/@miot_0" target="_blank" class="social-link">
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok">
            @miot_0
        </a>

        <a href="index.html" class="btn-back">← Kembali ke Home</a>
    </div>

</body>
</html>
